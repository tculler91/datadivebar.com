<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pit Viper | Data Dive Bar Barcade</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Share+Tech+Mono&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
        width: 100%; height: 100%;
        background: #050510;
        overflow: hidden;
        font-family: 'Share Tech Mono', monospace;
        color: #c8c8d4;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
    }
    canvas {
        display: block;
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        image-rendering: pixelated;
    }
    /* Scanlines */
    #scanlines {
        position: fixed; inset: 0; z-index: 10;
        background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
        pointer-events: none;
    }
    /* Vignette */
    #vignette {
        position: fixed; inset: 0; z-index: 11;
        background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.6) 100%);
        pointer-events: none;
    }
    /* Mobile D-Pad */
    #mobile-controls {
        display: none;
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 20;
    }
    .dpad {
        display: grid;
        grid-template-columns: 60px 60px 60px;
        grid-template-rows: 60px 60px 60px;
        gap: 4px;
    }
    .dpad-btn {
        background: rgba(180,74,255,0.25);
        border: 2px solid rgba(180,74,255,0.4);
        border-radius: 8px;
        color: rgba(180,74,255,0.8);
        font-size: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
    }
    .dpad-btn:active { background: rgba(180,74,255,0.5); }
    .dpad-center { background: none; border: none; }
    @media (pointer: coarse) {
        #mobile-controls { display: block; }
    }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="scanlines"></div>
<div id="vignette"></div>

<div id="mobile-controls">
    <div class="dpad">
        <div class="dpad-center"></div>
        <div class="dpad-btn" data-dir="up">&#9650;</div>
        <div class="dpad-center"></div>
        <div class="dpad-btn" data-dir="left">&#9664;</div>
        <div class="dpad-center"></div>
        <div class="dpad-btn" data-dir="right">&#9654;</div>
        <div class="dpad-center"></div>
        <div class="dpad-btn" data-dir="down">&#9660;</div>
        <div class="dpad-center"></div>
    </div>
</div>

<script>
// ============================================================
//  PIT VIPER — An intense neon snake game for Data Dive Bar
// ============================================================

// --- SUPABASE LEADERBOARD (loaded async — never blocks the game) ---
const SUPABASE_URL = 'https://lfxfutgrgzygqnwdeyby.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxmeGZ1dGdyZ3p5Z3Fud2RleWJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMjQ5MzAsImV4cCI6MjA4NzgwMDkzMH0.xBWGRbrBloOZgUqIpnd-aHC89MgqBAZhZkx57u3FwQo';
const LB_TABLE = 'pit_viper_scores';

let sbClient = null, cloudReady = false;

// Load Supabase SDK async so the game always starts immediately
(function loadSupabase() {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js';
    s.async = true;
    s.onload = function() {
        try {
            sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            cloudReady = true;
            // Flush any scores queued while SDK was loading
            const pending = JSON.parse(localStorage.getItem('pitViperPending') || '[]');
            if (pending.length > 0) {
                sbClient.from(LB_TABLE).insert(pending)
                    .then(({ error }) => { if (!error) localStorage.removeItem('pitViperPending'); });
            }
        } catch(e) { console.warn('Supabase init failed:', e); }
    };
    s.onerror = function() { console.warn('Supabase SDK failed to load — leaderboard offline'); };
    document.head.appendChild(s);
})();

// --- CANVAS SETUP ---
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const GRID = 20;          // cell size in pixels
const COLS = 30;           // grid columns
const ROWS = 22;           // grid rows
const HUD_HEIGHT = 2;     // rows reserved for HUD at top

canvas.width = COLS * GRID;
canvas.height = (ROWS + HUD_HEIGHT) * GRID;

function resize() {
    const pad = 10;
    const scaleX = (window.innerWidth - pad) / canvas.width;
    const scaleY = (window.innerHeight - pad) / canvas.height;
    const scale = Math.min(scaleX, scaleY, 2);
    canvas.style.width = (canvas.width * scale) + 'px';
    canvas.style.height = (canvas.height * scale) + 'px';
}
window.addEventListener('resize', resize);
resize();

// --- AUDIO ENGINE ---
class SFX {
    constructor() {
        this.ctx = null;
        this.muted = false;
    }
    init() {
        if (this.ctx) return;
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    }
    play(type) {
        if (this.muted || !this.ctx) return;
        const now = this.ctx.currentTime;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.ctx.destination);

        switch(type) {
            case 'eat':
                osc.type = 'square';
                osc.frequency.setValueAtTime(440, now);
                osc.frequency.exponentialRampToValueAtTime(880, now + 0.08);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
                osc.start(now); osc.stop(now + 0.12);
                break;
            case 'powerup':
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523, now);
                osc.frequency.exponentialRampToValueAtTime(1047, now + 0.15);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
                osc.start(now); osc.stop(now + 0.25);
                // second harmonic
                const o2 = this.ctx.createOscillator();
                const g2 = this.ctx.createGain();
                o2.connect(g2); g2.connect(this.ctx.destination);
                o2.type = 'sine';
                o2.frequency.setValueAtTime(659, now + 0.08);
                o2.frequency.exponentialRampToValueAtTime(1319, now + 0.2);
                g2.gain.setValueAtTime(0.15, now + 0.08);
                g2.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                o2.start(now + 0.08); o2.stop(now + 0.3);
                break;
            case 'die':
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(50, now + 0.5);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
                osc.start(now); osc.stop(now + 0.5);
                break;
            case 'combo':
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(660, now);
                osc.frequency.exponentialRampToValueAtTime(1320, now + 0.06);
                gain.gain.setValueAtTime(0.12, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
                break;
            case 'levelup':
                osc.type = 'square';
                [523,659,784,1047].forEach((f,i) => {
                    osc.frequency.setValueAtTime(f, now + i*0.1);
                });
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.setValueAtTime(0.15, now + 0.35);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
                osc.start(now); osc.stop(now + 0.5);
                break;
            case 'coin':
                osc.type = 'square';
                osc.frequency.setValueAtTime(988, now);
                osc.frequency.setValueAtTime(1319, now + 0.08);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
                osc.start(now); osc.stop(now + 0.2);
                break;
            case 'warp':
                osc.type = 'sine';
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.exponentialRampToValueAtTime(1600, now + 0.12);
                osc.frequency.exponentialRampToValueAtTime(200, now + 0.24);
                gain.gain.setValueAtTime(0.12, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
                break;
        }
    }
    toggle() { this.muted = !this.muted; }
}
const sfx = new SFX();

// --- COLORS ---
const C = {
    bg: '#08080f',
    grid: 'rgba(180,74,255,0.04)',
    snake: '#b44aff',
    snakeHead: '#d88aff',
    snakeGlow: 'rgba(180,74,255,0.5)',
    trail: 'rgba(180,74,255,0.12)',
    food: '#39ff14',
    foodGlow: 'rgba(57,255,20,0.4)',
    bonus: '#FF6B0A',
    bonusGlow: 'rgba(255,107,10,0.4)',
    golden: '#FFD700',
    goldenGlow: 'rgba(255,215,0,0.5)',
    hazard: '#ff2244',
    hazardGlow: 'rgba(255,34,68,0.3)',
    powerSlow: '#4A90FF',
    powerGhost: '#00ffcc',
    powerDouble: '#FFD700',
    powerShrink: '#ff69b4',
    hud: '#b44aff',
    hudDim: 'rgba(180,74,255,0.5)',
    text: '#c8c8d4',
    white: '#ffffff',
    wall: '#2a2a4e',
    wallGlow: 'rgba(180,74,255,0.15)',
};

// --- GAME STATE ---
const STATE = { TITLE: 0, PLAYING: 1, PAUSED: 2, GAMEOVER: 3, LEADERBOARD: 4 };
let state = STATE.TITLE;

let snake, dir, nextDir, food, bonusFood, goldenFood;
let score, hiScore, level, speed, baseSpeed;
let combo, comboTimer, maxCombo;
let particles = [], floatingTexts = [], screenShake = { x: 0, y: 0, intensity: 0 };
let hazards = [], powerUp, activePower, powerTimer = 0;
let ghostMode = false, doublePoints = false, slowMode = false;
let totalEaten, deathCount;
let lastMoveTime = 0, moveInterval = 120;
let snakeTrail = [];
let levelUpFlash = 0, levelUpTimer = 0;
let inputQueue = [];
let leaderboard;

hiScore = parseInt(localStorage.getItem('pitViperHi') || '0');
leaderboard = [];

function initGame() {
    const startX = Math.floor(COLS / 2);
    const startY = Math.floor(ROWS / 2) + HUD_HEIGHT;
    snake = [];
    for (let i = 0; i < 4; i++) snake.push({ x: startX - i, y: startY });
    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    inputQueue = [];
    score = 0;
    level = 1;
    combo = 0;
    comboTimer = 0;
    maxCombo = 0;
    totalEaten = 0;
    particles = [];
    floatingTexts = [];
    screenShake = { x: 0, y: 0, intensity: 0 };
    hazards = [];
    powerUp = null;
    activePower = null;
    powerTimer = 0;
    ghostMode = false;
    doublePoints = false;
    slowMode = false;
    snakeTrail = [];
    levelUpFlash = 0;
    levelUpTimer = 0;
    baseSpeed = 120;
    speed = baseSpeed;
    moveInterval = speed;
    lastMoveTime = 0;
    bonusFood = null;
    goldenFood = null;

    spawnFood();
}

// --- FOOD & SPAWNING ---
function isCellOccupied(x, y) {
    if (snake.some(s => s.x === x && s.y === y)) return true;
    if (hazards.some(h => h.x === x && h.y === y)) return true;
    if (food && food.x === x && food.y === y) return true;
    if (bonusFood && bonusFood.x === x && bonusFood.y === y) return true;
    if (goldenFood && goldenFood.x === x && goldenFood.y === y) return true;
    if (powerUp && powerUp.x === x && powerUp.y === y) return true;
    return false;
}

function randomCell() {
    let x, y, attempts = 0;
    do {
        x = Math.floor(Math.random() * COLS);
        y = Math.floor(Math.random() * ROWS) + HUD_HEIGHT;
        attempts++;
    } while (isCellOccupied(x, y) && attempts < 200);
    return { x, y };
}

function spawnFood() {
    food = randomCell();
    food.pulse = 0;
}

function maybeSpawnBonus() {
    if (bonusFood || Math.random() > 0.12) return;
    bonusFood = randomCell();
    bonusFood.pulse = 0;
    bonusFood.life = 300; // frames to live
}

function maybeSpawnGolden() {
    if (goldenFood || Math.random() > 0.04) return;
    goldenFood = randomCell();
    goldenFood.pulse = 0;
    goldenFood.life = 180;
}

function maybeSpawnPowerUp() {
    if (powerUp || activePower || Math.random() > 0.06) return;
    powerUp = randomCell();
    powerUp.pulse = 0;
    powerUp.life = 250;
    const types = ['slow', 'ghost', 'double', 'shrink'];
    powerUp.type = types[Math.floor(Math.random() * types.length)];
}

function updateHazards() {
    // Add hazards starting at level 3
    const targetCount = Math.max(0, Math.min(level - 2, 20));
    while (hazards.length < targetCount) {
        const h = randomCell();
        h.pulse = Math.random() * Math.PI * 2;
        hazards.push(h);
    }
}

// --- PARTICLES ---
function spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
        particles.push({
            x: (x + 0.5) * GRID,
            y: (y + 0.5) * GRID,
            vx: (Math.random() - 0.5) * 6,
            vy: (Math.random() - 0.5) * 6,
            life: 1,
            decay: 0.02 + Math.random() * 0.03,
            color: color,
            size: 2 + Math.random() * 3,
        });
    }
}

function spawnFloatingText(x, y, text, color) {
    floatingTexts.push({
        x: (x + 0.5) * GRID,
        y: (y + 0.5) * GRID,
        text, color,
        life: 1,
        decay: 0.02,
    });
}

// --- INPUT ---
document.addEventListener('keydown', e => {
    sfx.init();
    if (state === STATE.TITLE) {
        state = STATE.PLAYING;
        initGame();
        sfx.play('coin');
        return;
    }
    if (state === STATE.GAMEOVER) {
        if (e.key === 'Enter' || e.key === ' ') {
            state = STATE.PLAYING;
            initGame();
            sfx.play('coin');
        }
        if (e.key === 'l' || e.key === 'L') {
            showLeaderboard();
        }
        return;
    }
    if (state === STATE.LEADERBOARD) {
        if (e.key === 'Escape' || e.key === 'Enter' || e.key === ' ') {
            state = STATE.GAMEOVER;
        }
        return;
    }
    if (state === STATE.PAUSED) {
        if (e.key === 'p' || e.key === 'P' || e.key === 'Escape') {
            state = STATE.PLAYING;
        }
        return;
    }
    if (state !== STATE.PLAYING) return;

    if (e.key === 'p' || e.key === 'P' || e.key === 'Escape') {
        state = STATE.PAUSED;
        return;
    }
    if (e.key === 'm' || e.key === 'M') {
        sfx.toggle();
        return;
    }

    let newDir = null;
    switch(e.key) {
        case 'ArrowUp':    case 'w': case 'W': newDir = { x: 0, y: -1 }; break;
        case 'ArrowDown':  case 's': case 'S': newDir = { x: 0, y: 1 };  break;
        case 'ArrowLeft':  case 'a': case 'A': newDir = { x: -1, y: 0 }; break;
        case 'ArrowRight': case 'd': case 'D': newDir = { x: 1, y: 0 };  break;
    }
    if (newDir) {
        e.preventDefault();
        queueDirection(newDir);
    }
});

function queueDirection(newDir) {
    // Use the last queued direction (or current dir) to validate
    const checkDir = inputQueue.length > 0 ? inputQueue[inputQueue.length - 1] : dir;
    if (newDir.x + checkDir.x !== 0 || newDir.y + checkDir.y !== 0) {
        if (inputQueue.length < 3) {
            inputQueue.push(newDir);
        }
    }
}

// Mobile controls
document.querySelectorAll('.dpad-btn').forEach(btn => {
    const handler = (e) => {
        e.preventDefault();
        sfx.init();
        const d = btn.dataset.dir;
        if (state === STATE.TITLE) { state = STATE.PLAYING; initGame(); sfx.play('coin'); return; }
        if (state === STATE.GAMEOVER) { state = STATE.PLAYING; initGame(); sfx.play('coin'); return; }
        if (state !== STATE.PLAYING) return;
        const dirs = { up: {x:0,y:-1}, down: {x:0,y:1}, left: {x:-1,y:0}, right: {x:1,y:0} };
        if (dirs[d]) queueDirection(dirs[d]);
    };
    btn.addEventListener('touchstart', handler, { passive: false });
    btn.addEventListener('mousedown', handler);
});

// Swipe support
let touchStart = null;
canvas.addEventListener('touchstart', e => {
    sfx.init();
    if (state === STATE.TITLE) { state = STATE.PLAYING; initGame(); sfx.play('coin'); return; }
    if (state === STATE.GAMEOVER) { state = STATE.PLAYING; initGame(); sfx.play('coin'); return; }
    touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
}, { passive: true });
canvas.addEventListener('touchmove', e => {
    if (!touchStart || state !== STATE.PLAYING) return;
    const dx = e.touches[0].clientX - touchStart.x;
    const dy = e.touches[0].clientY - touchStart.y;
    const minSwipe = 20;
    if (Math.abs(dx) < minSwipe && Math.abs(dy) < minSwipe) return;
    let newDir;
    if (Math.abs(dx) > Math.abs(dy)) {
        newDir = dx > 0 ? {x:1,y:0} : {x:-1,y:0};
    } else {
        newDir = dy > 0 ? {x:0,y:1} : {x:0,y:-1};
    }
    queueDirection(newDir);
    touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
}, { passive: true });

// --- GAME LOGIC ---
function getLevel() {
    if (totalEaten < 5) return 1;
    if (totalEaten < 12) return 2;
    if (totalEaten < 22) return 3;
    if (totalEaten < 35) return 4;
    if (totalEaten < 50) return 5;
    if (totalEaten < 70) return 6;
    if (totalEaten < 95) return 7;
    if (totalEaten < 125) return 8;
    if (totalEaten < 160) return 9;
    return 10;
}

function getSpeed() {
    // Gets faster as level increases. Slow-mo power counteracts.
    let s = baseSpeed - (level - 1) * 8;
    s = Math.max(s, 50); // speed cap
    if (slowMode) s *= 1.6;
    return s;
}

function moveSnake() {
    // Process input queue
    if (inputQueue.length > 0) {
        const next = inputQueue.shift();
        // Final safety check against reversal
        if (next.x + dir.x !== 0 || next.y + dir.y !== 0) {
            dir = next;
        }
    }

    const head = snake[0];
    let nx = head.x + dir.x;
    let ny = head.y + dir.y;

    // Wrap around edges
    if (nx < 0) nx = COLS - 1;
    if (nx >= COLS) nx = 0;
    if (ny < HUD_HEIGHT) ny = ROWS + HUD_HEIGHT - 1;
    if (ny >= ROWS + HUD_HEIGHT) ny = HUD_HEIGHT;

    // Check self-collision (unless ghost mode)
    if (!ghostMode) {
        for (let i = 0; i < snake.length; i++) {
            if (snake[i].x === nx && snake[i].y === ny) {
                die();
                return;
            }
        }
    }

    // Check hazard collision (unless ghost mode)
    if (!ghostMode) {
        for (const h of hazards) {
            if (h.x === nx && h.y === ny) {
                die();
                return;
            }
        }
    }

    // Add trail
    snakeTrail.push({ x: head.x, y: head.y, life: 1 });
    if (snakeTrail.length > 60) snakeTrail.shift();

    // Move
    snake.unshift({ x: nx, y: ny });

    let ate = false;

    // Check food
    if (food && nx === food.x && ny === food.y) {
        const pts = doublePoints ? 20 : 10;
        score += pts * (1 + Math.floor(combo / 3));
        combo++;
        comboTimer = 120;
        if (combo > maxCombo) maxCombo = combo;
        totalEaten++;
        sfx.play(combo >= 3 ? 'combo' : 'eat');
        spawnParticles(nx, ny, C.food, 8);
        spawnFloatingText(nx, ny, `+${pts * (1 + Math.floor(combo / 3))}`, C.food);
        spawnFood();
        ate = true;
        maybeSpawnBonus();
        maybeSpawnGolden();
        maybeSpawnPowerUp();
    }

    // Check bonus food
    if (bonusFood && nx === bonusFood.x && ny === bonusFood.y) {
        const pts = doublePoints ? 50 : 25;
        score += pts * (1 + Math.floor(combo / 3));
        combo++;
        comboTimer = 120;
        if (combo > maxCombo) maxCombo = combo;
        totalEaten++;
        sfx.play('combo');
        spawnParticles(nx, ny, C.bonus, 12);
        spawnFloatingText(nx, ny, `+${pts * (1 + Math.floor(combo / 3))}`, C.bonus);
        bonusFood = null;
        ate = true;
    }

    // Check golden food
    if (goldenFood && nx === goldenFood.x && ny === goldenFood.y) {
        const pts = doublePoints ? 200 : 100;
        score += pts;
        combo += 3;
        comboTimer = 180;
        if (combo > maxCombo) maxCombo = combo;
        totalEaten++;
        sfx.play('powerup');
        spawnParticles(nx, ny, C.golden, 20);
        spawnFloatingText(nx, ny, `+${pts}`, C.golden);
        screenShake.intensity = 6;
        goldenFood = null;
        ate = true;
    }

    // Check power-up
    if (powerUp && nx === powerUp.x && ny === powerUp.y) {
        activatePower(powerUp.type);
        sfx.play('powerup');
        spawnParticles(nx, ny, getPowerColor(powerUp.type), 15);
        powerUp = null;
        ate = true;
    }

    if (!ate) {
        snake.pop();
    }

    // Level check
    const newLevel = getLevel();
    if (newLevel > level) {
        level = newLevel;
        levelUpFlash = 1;
        levelUpTimer = 90;
        sfx.play('levelup');
        updateHazards();
    }

    // Update speed
    moveInterval = getSpeed();

    // Update hi score
    if (score > hiScore) {
        hiScore = score;
        localStorage.setItem('pitViperHi', hiScore);
    }
}

function die() {
    sfx.play('die');
    screenShake.intensity = 12;
    spawnParticles(snake[0].x, snake[0].y, C.hazard, 30);
    state = STATE.GAMEOVER;
    deathCount = (parseInt(localStorage.getItem('pitViperDeaths') || '0')) + 1;
    localStorage.setItem('pitViperDeaths', deathCount);
    submitScore();
}

// --- POWER-UPS ---
function getPowerColor(type) {
    switch(type) {
        case 'slow': return C.powerSlow;
        case 'ghost': return C.powerGhost;
        case 'double': return C.powerDouble;
        case 'shrink': return C.powerShrink;
    }
    return C.white;
}

function getPowerLabel(type) {
    switch(type) {
        case 'slow': return 'SLOW-MO';
        case 'ghost': return 'GHOST';
        case 'double': return '2X PTS';
        case 'shrink': return 'SHRINK';
    }
    return '';
}

function activatePower(type) {
    activePower = type;
    powerTimer = 300; // ~5 seconds at base speed
    ghostMode = type === 'ghost';
    doublePoints = type === 'double';
    slowMode = type === 'slow';
    if (type === 'shrink') {
        // Remove last 30% of snake (min keep 3)
        const removeCount = Math.max(0, Math.floor(snake.length * 0.3) - 0);
        for (let i = 0; i < removeCount && snake.length > 3; i++) {
            snake.pop();
        }
        sfx.play('warp');
        spawnFloatingText(snake[0].x, snake[0].y, 'SHRINK!', C.powerShrink);
        activePower = null;
        powerTimer = 0;
    } else {
        spawnFloatingText(snake[0].x, snake[0].y, getPowerLabel(type) + '!', getPowerColor(type));
    }
}

// --- LEADERBOARD ---
async function submitScore() {
    const entry = { name: 'AAA', score, level, max_combo: maxCombo, timestamp: Date.now() };
    // Prompt for name
    entry.name = promptName();

    if (cloudReady) {
        try {
            await sbClient.from(LB_TABLE).insert([entry]);
        } catch(e) {
            // Queue for later
            const pending = JSON.parse(localStorage.getItem('pitViperPending') || '[]');
            pending.push(entry);
            localStorage.setItem('pitViperPending', JSON.stringify(pending));
        }
    }

    // Local storage fallback
    const local = JSON.parse(localStorage.getItem('pitViperScores') || '[]');
    local.push(entry);
    local.sort((a,b) => b.score - a.score);
    localStorage.setItem('pitViperScores', JSON.stringify(local.slice(0, 20)));
}

function promptName() {
    // Simple 3-char name input (arcade style) - use stored name or default
    return localStorage.getItem('pitViperName') || 'AAA';
}

async function showLeaderboard() {
    state = STATE.LEADERBOARD;
    leaderboard = [];
    if (cloudReady) {
        try {
            const { data } = await sbClient.from(LB_TABLE)
                .select('name, score, level, max_combo')
                .order('score', { ascending: false })
                .limit(15);
            if (data) leaderboard = data;
        } catch(e) {}
    }
    if (leaderboard.length === 0) {
        leaderboard = JSON.parse(localStorage.getItem('pitViperScores') || '[]').slice(0, 15);
    }
}

// --- RENDERING ---
function drawGrid() {
    ctx.fillStyle = C.bg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Subtle grid
    ctx.strokeStyle = C.grid;
    ctx.lineWidth = 0.5;
    for (let x = 0; x <= COLS; x++) {
        ctx.beginPath();
        ctx.moveTo(x * GRID, HUD_HEIGHT * GRID);
        ctx.lineTo(x * GRID, canvas.height);
        ctx.stroke();
    }
    for (let y = HUD_HEIGHT; y <= ROWS + HUD_HEIGHT; y++) {
        ctx.beginPath();
        ctx.moveTo(0, y * GRID);
        ctx.lineTo(canvas.width, y * GRID);
        ctx.stroke();
    }

    // Arena border glow
    ctx.strokeStyle = C.hudDim;
    ctx.lineWidth = 2;
    ctx.strokeRect(0, HUD_HEIGHT * GRID, COLS * GRID, ROWS * GRID);
}

function drawTrail() {
    for (const t of snakeTrail) {
        const alpha = t.life * 0.15;
        ctx.fillStyle = `rgba(180,74,255,${alpha})`;
        ctx.fillRect(t.x * GRID + 3, t.y * GRID + 3, GRID - 6, GRID - 6);
    }
}

function drawSnake() {
    for (let i = snake.length - 1; i >= 0; i--) {
        const s = snake[i];
        const isHead = i === 0;
        const t = i / snake.length;

        if (ghostMode) {
            ctx.globalAlpha = 0.4 + Math.sin(Date.now() / 100 + i * 0.3) * 0.2;
        }

        // Body glow
        if (isHead) {
            ctx.shadowColor = C.snakeGlow;
            ctx.shadowBlur = 15;
        }

        // Color gradient along body
        const r = Math.floor(180 - t * 60);
        const g = Math.floor(74 - t * 30);
        const b = Math.floor(255 - t * 40);
        ctx.fillStyle = isHead ? C.snakeHead : `rgb(${r},${g},${b})`;

        const pad = isHead ? 1 : 2;
        const radius = isHead ? 4 : 3;
        roundRect(ctx, s.x * GRID + pad, s.y * GRID + pad, GRID - pad*2, GRID - pad*2, radius);
        ctx.fill();

        // Head eyes
        if (isHead) {
            ctx.shadowBlur = 0;
            ctx.fillStyle = C.white;
            const eyeSize = 3;
            let ex1, ey1, ex2, ey2;
            if (dir.x === 1) { ex1 = 13; ey1 = 5; ex2 = 13; ey2 = 12; }
            else if (dir.x === -1) { ex1 = 4; ey1 = 5; ex2 = 4; ey2 = 12; }
            else if (dir.y === -1) { ex1 = 5; ey1 = 4; ex2 = 12; ey2 = 4; }
            else { ex1 = 5; ey1 = 13; ex2 = 12; ey2 = 13; }
            ctx.fillRect(s.x * GRID + ex1, s.y * GRID + ey1, eyeSize, eyeSize);
            ctx.fillRect(s.x * GRID + ex2, s.y * GRID + ey2, eyeSize, eyeSize);
        }

        ctx.globalAlpha = 1;
        ctx.shadowBlur = 0;
    }
}

function drawFood() {
    const time = Date.now() / 1000;

    // Regular food
    if (food) {
        const pulse = 1 + Math.sin(time * 4) * 0.15;
        const size = (GRID - 6) * pulse;
        ctx.shadowColor = C.foodGlow;
        ctx.shadowBlur = 12;
        ctx.fillStyle = C.food;
        const cx = food.x * GRID + GRID/2;
        const cy = food.y * GRID + GRID/2;
        ctx.beginPath();
        ctx.arc(cx, cy, size/2, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
    }

    // Bonus food (orange, larger)
    if (bonusFood) {
        const pulse = 1 + Math.sin(time * 6) * 0.2;
        const size = (GRID - 4) * pulse;
        const alpha = bonusFood.life > 60 ? 1 : (bonusFood.life / 60);
        ctx.globalAlpha = alpha;
        ctx.shadowColor = C.bonusGlow;
        ctx.shadowBlur = 15;
        ctx.fillStyle = C.bonus;
        const cx = bonusFood.x * GRID + GRID/2;
        const cy = bonusFood.y * GRID + GRID/2;
        // Diamond shape
        ctx.beginPath();
        ctx.moveTo(cx, cy - size/2);
        ctx.lineTo(cx + size/2, cy);
        ctx.lineTo(cx, cy + size/2);
        ctx.lineTo(cx - size/2, cy);
        ctx.closePath();
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1;
    }

    // Golden food (rare, big points)
    if (goldenFood) {
        const pulse = 1 + Math.sin(time * 8) * 0.25;
        const size = (GRID - 2) * pulse;
        const alpha = goldenFood.life > 60 ? 1 : (goldenFood.life / 60);
        ctx.globalAlpha = alpha;
        ctx.shadowColor = C.goldenGlow;
        ctx.shadowBlur = 20;
        ctx.fillStyle = C.golden;
        const cx = goldenFood.x * GRID + GRID/2;
        const cy = goldenFood.y * GRID + GRID/2;
        // Star shape
        drawStar(cx, cy, 5, size/2, size/4);
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1;
    }
}

function drawStar(cx, cy, spikes, outerR, innerR) {
    ctx.beginPath();
    for (let i = 0; i < spikes * 2; i++) {
        const r = i % 2 === 0 ? outerR : innerR;
        const angle = (i * Math.PI / spikes) - Math.PI / 2;
        const x = cx + Math.cos(angle) * r;
        const y = cy + Math.sin(angle) * r;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fill();
}

function drawPowerUp() {
    if (!powerUp) return;
    const time = Date.now() / 1000;
    const pulse = 1 + Math.sin(time * 5) * 0.2;
    const color = getPowerColor(powerUp.type);
    const alpha = powerUp.life > 60 ? 1 : (powerUp.life / 60);
    ctx.globalAlpha = alpha;
    ctx.shadowColor = color;
    ctx.shadowBlur = 18;
    ctx.fillStyle = color;
    const cx = powerUp.x * GRID + GRID/2;
    const cy = powerUp.y * GRID + GRID/2;
    const size = (GRID - 4) * pulse;

    // Rotating square
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(time * 2);
    ctx.fillRect(-size/2, -size/2, size, size);
    ctx.restore();

    // Label
    ctx.shadowBlur = 0;
    ctx.font = '7px "Press Start 2P"';
    ctx.fillStyle = color;
    ctx.textAlign = 'center';
    ctx.fillText(getPowerLabel(powerUp.type), cx, cy - GRID/2 - 4);
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
}

function drawHazards() {
    const time = Date.now() / 1000;
    for (const h of hazards) {
        const pulse = Math.sin(time * 2 + h.pulse) * 0.1;
        ctx.shadowColor = C.hazardGlow;
        ctx.shadowBlur = 8;
        ctx.fillStyle = C.hazard;
        ctx.globalAlpha = 0.7 + pulse;
        // X shape
        const cx = h.x * GRID + GRID/2;
        const cy = h.y * GRID + GRID/2;
        ctx.lineWidth = 3;
        ctx.strokeStyle = C.hazard;
        ctx.beginPath();
        ctx.moveTo(cx - 6, cy - 6); ctx.lineTo(cx + 6, cy + 6);
        ctx.moveTo(cx + 6, cy - 6); ctx.lineTo(cx - 6, cy + 6);
        ctx.stroke();
        ctx.globalAlpha = 1;
        ctx.shadowBlur = 0;
    }
}

function drawParticles() {
    for (const p of particles) {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
    }
    ctx.globalAlpha = 1;
}

function drawFloatingTexts() {
    for (const ft of floatingTexts) {
        ctx.globalAlpha = ft.life;
        ctx.font = 'bold 12px "Share Tech Mono"';
        ctx.fillStyle = ft.color;
        ctx.textAlign = 'center';
        ctx.fillText(ft.text, ft.x, ft.y);
    }
    ctx.globalAlpha = 1;
}

function drawHUD() {
    const y = GRID * 0.5;

    // Background
    ctx.fillStyle = 'rgba(8,8,15,0.9)';
    ctx.fillRect(0, 0, canvas.width, HUD_HEIGHT * GRID);
    ctx.strokeStyle = C.hudDim;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, HUD_HEIGHT * GRID);
    ctx.lineTo(canvas.width, HUD_HEIGHT * GRID);
    ctx.stroke();

    // Score
    ctx.font = '11px "Press Start 2P"';
    ctx.fillStyle = C.food;
    ctx.textAlign = 'left';
    ctx.fillText('SCORE', 10, y + 4);
    ctx.font = '14px "Share Tech Mono"';
    ctx.fillText(score.toString().padStart(6, '0'), 10, y + 22);

    // Hi Score
    ctx.font = '11px "Press Start 2P"';
    ctx.fillStyle = C.powerSlow;
    ctx.textAlign = 'center';
    ctx.fillText('HI', canvas.width/2, y + 4);
    ctx.font = '14px "Share Tech Mono"';
    ctx.fillText(hiScore.toString().padStart(6, '0'), canvas.width/2, y + 22);

    // Level
    ctx.font = '11px "Press Start 2P"';
    ctx.fillStyle = C.bonus;
    ctx.textAlign = 'right';
    ctx.fillText('LVL ' + level, canvas.width - 10, y + 4);

    // Combo
    if (combo >= 2) {
        ctx.font = '10px "Press Start 2P"';
        ctx.fillStyle = combo >= 5 ? C.golden : C.bonus;
        const comboAlpha = comboTimer > 30 ? 1 : comboTimer / 30;
        ctx.globalAlpha = comboAlpha;
        ctx.textAlign = 'right';
        ctx.fillText(`x${combo} COMBO`, canvas.width - 10, y + 22);
        ctx.globalAlpha = 1;
    }

    // Length indicator
    ctx.font = '10px "Share Tech Mono"';
    ctx.fillStyle = C.hud;
    ctx.textAlign = 'center';
    ctx.fillText(`LENGTH: ${snake.length}`, canvas.width/2 + 80, y + 22);

    // Active power indicator
    if (activePower && powerTimer > 0) {
        const pw = powerTimer / 300;
        const barW = 80;
        const barH = 6;
        const bx = canvas.width/2 - barW/2;
        const by = HUD_HEIGHT * GRID - 10;
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(bx, by, barW, barH);
        ctx.fillStyle = getPowerColor(activePower);
        ctx.fillRect(bx, by, barW * pw, barH);
        ctx.font = '7px "Press Start 2P"';
        ctx.fillStyle = getPowerColor(activePower);
        ctx.textAlign = 'center';
        ctx.fillText(getPowerLabel(activePower), canvas.width/2, by - 3);
    }

    // Mute indicator
    if (sfx.muted) {
        ctx.font = '8px "Share Tech Mono"';
        ctx.fillStyle = C.hudDim;
        ctx.textAlign = 'left';
        ctx.fillText('MUTED', 10, HUD_HEIGHT * GRID - 5);
    }
}

function drawLevelUpFlash() {
    if (levelUpFlash <= 0) return;
    ctx.fillStyle = `rgba(180,74,255,${levelUpFlash * 0.15})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.font = '20px "Press Start 2P"';
    ctx.fillStyle = C.hud;
    ctx.globalAlpha = levelUpFlash;
    ctx.textAlign = 'center';
    ctx.fillText(`LEVEL ${level}`, canvas.width/2, canvas.height/2);
    ctx.globalAlpha = 1;
}

function drawTitle() {
    ctx.fillStyle = C.bg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const time = Date.now() / 1000;

    // Draw grid as decoration
    ctx.strokeStyle = C.grid;
    ctx.lineWidth = 0.5;
    for (let x = 0; x <= COLS; x++) {
        ctx.beginPath();
        ctx.moveTo(x * GRID, 0);
        ctx.lineTo(x * GRID, canvas.height);
        ctx.stroke();
    }
    for (let y = 0; y <= ROWS + HUD_HEIGHT; y++) {
        ctx.beginPath();
        ctx.moveTo(0, y * GRID);
        ctx.lineTo(canvas.width, y * GRID);
        ctx.stroke();
    }

    // Animated decorative snake
    const demoLen = 12;
    for (let i = 0; i < demoLen; i++) {
        const t = time * 1.5 - i * 0.3;
        const dx = canvas.width/2 + Math.cos(t) * 100;
        const dy = canvas.height/2 + 60 + Math.sin(t * 2) * 30;
        const alpha = 1 - (i / demoLen) * 0.7;
        ctx.globalAlpha = alpha;
        ctx.shadowColor = C.snakeGlow;
        ctx.shadowBlur = i === 0 ? 15 : 0;
        const r = Math.floor(180 - (i/demoLen) * 60);
        const g = Math.floor(74 - (i/demoLen) * 30);
        const b = Math.floor(255 - (i/demoLen) * 40);
        ctx.fillStyle = i === 0 ? C.snakeHead : `rgb(${r},${g},${b})`;
        roundRect(ctx, dx - 8, dy - 8, 16, 16, i === 0 ? 4 : 3);
        ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;

    // Title
    ctx.font = '28px "Press Start 2P"';
    ctx.fillStyle = C.snake;
    ctx.textAlign = 'center';
    ctx.shadowColor = C.snakeGlow;
    ctx.shadowBlur = 20;
    ctx.fillText('PIT VIPER', canvas.width/2, canvas.height/2 - 80);
    ctx.shadowBlur = 0;

    // Subtitle
    ctx.font = '10px "Share Tech Mono"';
    ctx.fillStyle = C.hudDim;
    ctx.fillText('A DATA DIVE BAR ORIGINAL', canvas.width/2, canvas.height/2 - 55);

    // Blink insert coin
    if (Math.sin(time * 3) > 0) {
        ctx.font = '11px "Press Start 2P"';
        ctx.fillStyle = C.snake;
        ctx.fillText('PRESS ANY KEY', canvas.width/2, canvas.height/2 + 130);
    }

    // Controls
    ctx.font = '10px "Share Tech Mono"';
    ctx.fillStyle = C.text;
    ctx.fillText('WASD / ARROWS to move', canvas.width/2, canvas.height/2 + 160);
    ctx.fillText('P to pause  |  M to mute', canvas.width/2, canvas.height/2 + 178);

    // Stats
    const deaths = parseInt(localStorage.getItem('pitViperDeaths') || '0');
    if (hiScore > 0 || deaths > 0) {
        ctx.font = '9px "Share Tech Mono"';
        ctx.fillStyle = C.hudDim;
        ctx.fillText(`HIGH SCORE: ${hiScore}  |  DEATHS: ${deaths}`, canvas.width/2, canvas.height/2 + 205);
    }

    // Back link
    ctx.font = '9px "Share Tech Mono"';
    ctx.fillStyle = C.hudDim;
    ctx.fillText('datadivebar.com/barcade', canvas.width/2, canvas.height - 15);
}

function drawGameOver() {

    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const time = Date.now() / 1000;

    ctx.fillStyle = C.hazard;
    ctx.textAlign = 'center';
    ctx.shadowColor = C.hazardGlow;
    ctx.shadowBlur = 20;
    ctx.fillText('GAME OVER', canvas.width/2, canvas.height/2 - 70);
    ctx.shadowBlur = 0;

    // Stats
    ctx.font = '12px "Share Tech Mono"';
    ctx.fillStyle = C.text;
    ctx.fillText(`SCORE: ${score}`, canvas.width/2, canvas.height/2 - 30);

    if (maxCombo >= 3) {
        ctx.fillStyle = C.golden;
        ctx.fillText(`MAX COMBO: x${maxCombo}`, canvas.width/2, canvas.height/2 + 10);

    // Name entry
    ctx.font = '10px "Press Start 2P"';
    ctx.fillStyle = C.hud;

    ctx.fillStyle = C.snake;
    ctx.fillText(name, canvas.width/2, canvas.height/2 + 75);

    if (Math.sin(time * 3) > 0) {
        ctx.font = '9px "Press Start 2P"';
        ctx.fillStyle = C.snake;
        ctx.fillText('PRESS ENTER TO RETRY', canvas.width/2, canvas.height/2 + 110);
    }
    ctx.font = '9px "Share Tech Mono"';
    ctx.fillStyle = C.hudDim;

function drawLeaderboard() {
    ctx.fillStyle = 'rgba(5,5,16,0.95)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.font = '16px "Press Start 2P"';
    ctx.fillStyle = C.golden;
    ctx.textAlign = 'center';
    ctx.fillText('LEADERBOARD', canvas.width/2, 60);

    ctx.font = '10px "Share Tech Mono"';
    ctx.fillStyle = C.hudDim;
    ctx.textAlign = 'left';
    ctx.fillText('RANK  NAME       SCORE    LVL', 80, 95);

    for (let i = 0; i < leaderboard.length && i < 15; i++) {
        const e = leaderboard[i];
        const y = 120 + i * 22;
        const rank = (i + 1).toString().padStart(2, ' ');
        const name = (e.name || 'AAA').padEnd(10, ' ');
        const sc = (e.score || 0).toString().padStart(8, ' ');
        const lv = (e.level || 1).toString().padStart(3, ' ');
        ctx.fillStyle = i === 0 ? C.golden : i < 3 ? C.bonus : C.text;
        ctx.fillText(`${rank}.  ${name} ${sc}  ${lv}`, 80, y);
    }
    if (leaderboard.length === 0) {
        ctx.fillStyle = C.hudDim;
        ctx.textAlign = 'center';
        ctx.fillText('No scores yet. Be the first!', canvas.width/2, 140);
    }

    ctx.font = '9px "Press Start 2P"';
    ctx.fillStyle = C.hudDim;
    ctx.textAlign = 'center';
    ctx.fillText('PRESS ESC TO GO BACK', canvas.width/2, canvas.height - 30);
}

function drawPaused() {
    ctx.fillStyle = 'rgba(5,5,16,0.7)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.font = '20px "Press Start 2P"';
    ctx.fillStyle = C.hud;
    ctx.textAlign = 'center';
    ctx.fillText('PAUSED', canvas.width/2, canvas.height/2);

    ctx.font = '10px "Share Tech Mono"';
    ctx.fillStyle = C.hudDim;
    ctx.fillText('Press P or ESC to resume', canvas.width/2, canvas.height/2 + 30);
}

// --- UTILITY ---
function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
}

// --- NAME INPUT ---
// Allow typing name on game over screen
let nameInput = localStorage.getItem('pitViperName') || 'AAA';
document.addEventListener('keydown', e => {
    if (state !== STATE.GAMEOVER) return;
    if (e.key === 'Backspace') {
        nameInput = nameInput.slice(0, -1);
        localStorage.setItem('pitViperName', nameInput);
    } else if (e.key.length === 1 && /[a-zA-Z0-9 ]/.test(e.key) && nameInput.length < 10) {
        nameInput += e.key.toUpperCase();
        localStorage.setItem('pitViperName', nameInput);
    }
});

// --- MAIN LOOP ---
let lastFrame = null;

function update(dt) {
    if (state !== STATE.PLAYING) return;

    // Combo timer
    if (comboTimer > 0) {
        comboTimer--;
        if (comboTimer <= 0) combo = 0;
    }

    // Power timer
    if (powerTimer > 0) {
        powerTimer--;
        if (powerTimer <= 0) {
            activePower = null;
            ghostMode = false;
            doublePoints = false;
            slowMode = false;
        }
    }

    // Bonus food lifetime
    if (bonusFood) {
        bonusFood.life--;
        if (bonusFood.life <= 0) bonusFood = null;
    }
    if (goldenFood) {
        goldenFood.life--;
        if (goldenFood.life <= 0) goldenFood = null;
    }
    if (powerUp) {
        powerUp.life--;
        if (powerUp.life <= 0) powerUp = null;
    }

    // Trail decay
    for (const t of snakeTrail) t.life -= 0.02;
    snakeTrail = snakeTrail.filter(t => t.life > 0);

    // Particles
    for (const p of particles) {
        p.x += p.vx;
        p.y += p.vy;
        p.life -= p.decay;
        p.vx *= 0.96;
        p.vy *= 0.96;
    }
    particles = particles.filter(p => p.life > 0);

    // Floating texts
    for (const ft of floatingTexts) {
        ft.y -= 1;
        ft.life -= ft.decay;
    }
    floatingTexts = floatingTexts.filter(ft => ft.life > 0);

    // Screen shake decay
    if (screenShake.intensity > 0) {
        screenShake.x = (Math.random() - 0.5) * screenShake.intensity;
        screenShake.y = (Math.random() - 0.5) * screenShake.intensity;
        screenShake.intensity *= 0.85;
        if (screenShake.intensity < 0.3) {
            screenShake.intensity = 0;
            screenShake.x = 0;
            screenShake.y = 0;
        }
    }

    // Level up flash
    if (levelUpFlash > 0) levelUpFlash -= 0.015;
    if (levelUpTimer > 0) levelUpTimer--;
}

function render() {
    ctx.save();
    if (screenShake.intensity > 0) {
        ctx.translate(screenShake.x, screenShake.y);
    }

    if (state === STATE.TITLE) {
        drawTitle();
    } else if (state === STATE.LEADERBOARD) {
        drawLeaderboard();
    } else {
        drawGrid();
        drawTrail();
        drawHazards();
        drawFood();
        drawPowerUp();
        drawSnake();
        drawParticles();
        drawFloatingTexts();
        drawHUD();
        drawLevelUpFlash();

        if (state === STATE.GAMEOVER) drawGameOver();
        if (state === STATE.PAUSED) drawPaused();
    }

    ctx.restore();
}

function gameLoop(timestamp) {
    if (lastFrame === null) lastFrame = timestamp;
    const dt = Math.min(timestamp - lastFrame, 100); // cap dt to avoid burst on first frame/tab switch
    lastFrame = timestamp;

    update(dt);

    // Snake movement on interval
    if (state === STATE.PLAYING) {
        lastMoveTime += dt;
        while (lastMoveTime >= moveInterval) {
            lastMoveTime -= moveInterval;
            moveSnake();
            if (state !== STATE.PLAYING) break;
        }
    }

    render();
    requestAnimationFrame(gameLoop);
}

// Start
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
