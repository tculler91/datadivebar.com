<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Anchor Man | Data Dive Bar</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Share+Tech+Mono&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #060C16;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            font-family: 'Press Start 2P', monospace;
        }
        #gameContainer {
            position: relative;
            /* Scale to fill viewport while maintaining 4:3 */
            width: min(100vw, calc(100vh * 4 / 3));
            height: min(100vh, calc(100vw * 3 / 4));
            max-width: 1200px;
            max-height: 900px;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
            image-rendering: pixelated;
        }
        #scanlines {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(
                0deg, transparent, transparent 2px,
                rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px
            );
            pointer-events: none;
            z-index: 10;
        }
        #vignette {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.7) 100%);
            pointer-events: none;
            z-index: 11;
        }
        #mobileControls {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0; right: 0;
            z-index: 20;
            justify-content: space-between;
            align-items: flex-end;
            padding: 12px 16px;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
            pointer-events: none;
        }
        #mobileControls > * { pointer-events: auto; }
        .dpad {
            display: grid;
            grid-template-columns: 62px 62px 62px;
            grid-template-rows: 62px 62px 62px;
            gap: 4px;
        }
        .dpad-btn {
            background: rgba(255, 107, 10, 0.25);
            border: 2px solid rgba(255, 107, 10, 0.5);
            border-radius: 10px;
            color: rgba(255, 107, 10, 0.9);
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            transition: background 0.05s;
        }
        .dpad-btn.active { background: rgba(255, 107, 10, 0.6); border-color: rgba(255, 107, 10, 0.9); }
        .dpad-blank { background: none; border: none; }
        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }
        .action-btn {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: 2px solid rgba(74, 144, 255, 0.6);
            background: rgba(74, 144, 255, 0.2);
            color: rgba(74, 144, 255, 0.9);
            font-family: 'Press Start 2P', monospace;
            font-size: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .action-btn.active { background: rgba(74, 144, 255, 0.5); border-color: rgba(74, 144, 255, 0.9); }
        .action-btn-sm {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2px solid rgba(200, 200, 212, 0.3);
            background: rgba(200, 200, 212, 0.1);
            color: rgba(200, 200, 212, 0.7);
            font-family: 'Press Start 2P', monospace;
            font-size: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        #coinSplash {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 100;
            background: #060C16;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        #coinSplash .splash-title {
            font-family: 'VT323', monospace;
            font-size: 48px;
            color: #FF6B0A;
            text-shadow: 0 0 30px rgba(255,107,10,0.6);
            margin-bottom: 20px;
        }
        #coinSplash .splash-anchor {
            font-size: 64px;
            margin-bottom: 30px;
            animation: anchorSwing 2s ease-in-out infinite;
        }
        @keyframes anchorSwing {
            0%, 100% { transform: rotate(-8deg); }
            50% { transform: rotate(8deg); }
        }
        #coinSplash .splash-coin {
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            color: #C8C8D4;
            animation: coinBlink 1s step-end infinite;
        }
        @keyframes coinBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        #coinSplash .splash-sub {
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px;
            color: rgba(200,200,212,0.4);
            margin-top: 16px;
        }
        #mobileNameInput {
            position: fixed;
            left: -9999px;
            top: 0;
            opacity: 0;
            width: 1px;
            height: 1px;
            border: none;
            font-size: 16px; /* prevent iOS zoom */
        }
        @media (max-width: 768px) {
            #mobileControls { display: flex; }
            #gameContainer {
                /* Shrink canvas to leave room for controls */
                height: min(calc(100vh - 210px), calc(100vw * 3 / 4));
                align-self: flex-start;
                margin-top: 4px;
            }
        }
        @media (hover: none) and (pointer: coarse) {
            #mobileControls { display: flex; }
            #gameContainer {
                height: min(calc(100vh - 210px), calc(100vw * 3 / 4));
                align-self: flex-start;
                margin-top: 4px;
            }
        }
    </style>
</head>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script>
// ============================================================
// ANCHOR MAN - A Dodge Game
// "Burt Lake, Michigan - 2018"
// ============================================================

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = 800, H = 600;

// ============================================================
// SUPABASE LEADERBOARD
// Same Supabase project as Bar Invaders. Run this SQL once:
//
//   CREATE TABLE anchor_man_scores (
//     id          BIGSERIAL PRIMARY KEY,
//     name        TEXT    NOT NULL,
//     score       INTEGER NOT NULL,
//     wave        INTEGER NOT NULL,
//     timestamp   BIGINT  NOT NULL,
//     created_at  TIMESTAMPTZ DEFAULT NOW()
//   );
//   ALTER TABLE anchor_man_scores ENABLE ROW LEVEL SECURITY;
//   CREATE POLICY "public read"
//     ON anchor_man_scores FOR SELECT USING (true);
//   CREATE POLICY "public insert"
//     ON anchor_man_scores FOR INSERT WITH CHECK (true);
//
// ============================================================
const SUPABASE_URL = 'https://lfxfutgrgzygqnwdeyby.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxmeGZ1dGdyZ3p5Z3Fud2RleWJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMjQ5MzAsImV4cCI6MjA4NzgwMDkzMH0.xBWGRbrBloOZgUqIpnd-aHC89MgqBAZhZkx57u3FwQo';
const TABLE_NAME = 'anchor_man_scores';

let sbClient = null;
let cloudReady = false;
try {
    if (typeof supabase !== 'undefined') {
        sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        cloudReady = true;
    }
} catch(e) {
    console.warn('Supabase init failed — localStorage fallback:', e);
}

// Flush pending offline scores
const _pending = JSON.parse(localStorage.getItem('anchorManPending') || '[]');
if (cloudReady && _pending.length > 0) {
    sbClient.from(TABLE_NAME).insert(_pending)
        .then(({ error }) => { if (!error) localStorage.removeItem('anchorManPending'); });
}

// Game states
const STATE = { MENU: 0, PLAYING: 1, PAUSED: 2, GAMEOVER: 3, LEADERBOARD: 4, WAVE_INTRO: 5 };
let state = STATE.MENU;

const COL = {
    water1: '#0a2a4a', water2: '#0d3560', water3: '#082040',
    boat: '#8B6914', boatDark: '#6B4F10', boatDeck: '#C4A35A', boatDeckLight: '#d4b86a',
    anchor: '#708090', anchorDark: '#4a5a6a',
    neonOrange: '#FF6B0A', neonBlue: '#4A90FF', neonGreen: '#39ff14',
    neonPink: '#FF1493', neonAmber: '#FF8C2A',
    textLight: '#c8c8d4', textDim: '#6b6b7b',
    red: '#ff4444', gold: '#FFD700', white: '#ffffff',
    treeDark: '#0a3a1a', treeMid: '#1a5a2a', treeLight: '#2a7a3a',
    sky: '#1a2a4a', mountain: '#1a2035',
};

// ============================================================
// AUDIO SYSTEM
// ============================================================
let audioCtx = null;
let muted = false;

function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    // Mobile browsers suspend AudioContext until resumed inside a user gesture
    if (audioCtx && audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
}

function playSound(type) {
    if (muted || !audioCtx) return;
    const t = audioCtx.currentTime;
    const g = audioCtx.createGain();
    g.connect(audioCtx.destination);
    switch(type) {
        case 'dodge': {
            const o = audioCtx.createOscillator();
            o.type = 'sine';
            o.frequency.setValueAtTime(880, t);
            o.frequency.exponentialRampToValueAtTime(1320, t + 0.08);
            g.gain.setValueAtTime(0.12, t);
            g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
            o.connect(g); o.start(t); o.stop(t + 0.15);
            break;
        }
        case 'hit': {
            const o = audioCtx.createOscillator();
            o.type = 'sawtooth';
            o.frequency.setValueAtTime(200, t);
            o.frequency.exponentialRampToValueAtTime(60, t + 0.4);
            g.gain.setValueAtTime(0.2, t);
            g.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
            o.connect(g); o.start(t); o.stop(t + 0.4);
            const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.15, audioCtx.sampleRate);
            const data = buf.getChannelData(0);
            for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * 0.3;
            const n = audioCtx.createBufferSource(); n.buffer = buf;
            const g2 = audioCtx.createGain();
            g2.gain.setValueAtTime(0.25, t);
            g2.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
            n.connect(g2); g2.connect(audioCtx.destination);
            n.start(t); n.stop(t + 0.15);
            break;
        }
        case 'powerup': {
            const o = audioCtx.createOscillator(); o.type = 'sine';
            o.frequency.setValueAtTime(440, t);
            o.frequency.setValueAtTime(554, t + 0.06);
            o.frequency.setValueAtTime(660, t + 0.12);
            o.frequency.setValueAtTime(880, t + 0.18);
            g.gain.setValueAtTime(0.15, t);
            g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
            o.connect(g); o.start(t); o.stop(t + 0.3);
            break;
        }
        case 'waveClear': {
            [523, 659, 784, 1047].forEach((freq, i) => {
                const o = audioCtx.createOscillator(); o.type = 'square'; o.frequency.value = freq;
                const gn = audioCtx.createGain();
                gn.gain.setValueAtTime(0, t + i * 0.1);
                gn.gain.linearRampToValueAtTime(0.1, t + i * 0.1 + 0.02);
                gn.gain.exponentialRampToValueAtTime(0.001, t + i * 0.1 + 0.2);
                o.connect(gn); gn.connect(audioCtx.destination);
                o.start(t + i * 0.1); o.stop(t + i * 0.1 + 0.2);
            });
            break;
        }
        case 'gameOver': {
            [400, 350, 300, 200].forEach((freq, i) => {
                const o = audioCtx.createOscillator(); o.type = 'sawtooth'; o.frequency.value = freq;
                const gn = audioCtx.createGain();
                gn.gain.setValueAtTime(0.12, t + i * 0.2);
                gn.gain.exponentialRampToValueAtTime(0.001, t + i * 0.2 + 0.3);
                o.connect(gn); gn.connect(audioCtx.destination);
                o.start(t + i * 0.2); o.stop(t + i * 0.2 + 0.3);
            });
            break;
        }
        case 'collect': {
            const o = audioCtx.createOscillator(); o.type = 'sine';
            o.frequency.setValueAtTime(660, t);
            o.frequency.exponentialRampToValueAtTime(990, t + 0.1);
            g.gain.setValueAtTime(0.12, t);
            g.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
            o.connect(g); o.start(t); o.stop(t + 0.12);
            break;
        }
        case 'splash': {
            const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.3, audioCtx.sampleRate);
            const data = buf.getChannelData(0);
            for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1);
            const n = audioCtx.createBufferSource(); n.buffer = buf;
            const filt = audioCtx.createBiquadFilter();
            filt.type = 'lowpass';
            filt.frequency.setValueAtTime(2000, t);
            filt.frequency.exponentialRampToValueAtTime(200, t + 0.3);
            g.gain.setValueAtTime(0.08, t);
            g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
            n.connect(filt); filt.connect(g);
            n.start(t); n.stop(t + 0.3);
            break;
        }
        case 'victory': {
            [523, 659, 784, 1047, 784, 1047, 1319].forEach((freq, i) => {
                const o = audioCtx.createOscillator(); o.type = 'square'; o.frequency.value = freq;
                const gn = audioCtx.createGain();
                gn.gain.setValueAtTime(0, t + i * 0.12);
                gn.gain.linearRampToValueAtTime(0.12, t + i * 0.12 + 0.02);
                gn.gain.exponentialRampToValueAtTime(0.001, t + i * 0.12 + 0.25);
                o.connect(gn); gn.connect(audioCtx.destination);
                o.start(t + i * 0.12); o.stop(t + i * 0.12 + 0.25);
            });
            break;
        }
    }
}

// ============================================================
// INPUT
// ============================================================
const keys = {};
window.addEventListener('keydown', e => {
    keys[e.key] = true;
    if ([' ', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) e.preventDefault();
    if (state === STATE.MENU) {
        if (e.key === 'Enter' || e.key === ' ') startGame();
        else if (e.key === 'l' || e.key === 'L') { state = STATE.LEADERBOARD; loadLeaderboard(); }
        return;
    }
    if (state === STATE.PLAYING) {
        if (e.key === 'p' || e.key === 'P') { state = STATE.PAUSED; return; }
        if (e.key === 'm' || e.key === 'M') { muted = !muted; return; }
    }
    if (state === STATE.PAUSED) {
        if (e.key === 'p' || e.key === 'P') { state = STATE.PLAYING; return; }
    }
    if (state === STATE.GAMEOVER) {
        if (e.key === 'Backspace') { playerName = playerName.slice(0, -1); return; }
        if (e.key === 'Enter' && playerName.length > 0) { submitScore(); return; }
        if (e.key.length === 1 && playerName.length < 8 && /[a-zA-Z0-9 ]/.test(e.key)) {
            playerName += e.key.toUpperCase();
        }
        return;
    }
    if (state === STATE.LEADERBOARD) {
        if (e.key === 'Escape' || e.key === 'Enter') { state = STATE.MENU; return; }
    }
    if (state === STATE.WAVE_INTRO) {
        if (e.key === 'Enter' || e.key === ' ') { state = STATE.PLAYING; return; }
    }
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

const mobileDir = { up: false, down: false, left: false, right: false };
document.querySelectorAll('.dpad-btn').forEach(btn => {
    const dir = btn.dataset.dir;
    btn.addEventListener('touchstart', e => {
        e.preventDefault();
        mobileDir[dir] = true;
        btn.classList.add('active');
        initAudio();
    });
    btn.addEventListener('touchend', e => {
        e.preventDefault();
        mobileDir[dir] = false;
        btn.classList.remove('active');
    });
    btn.addEventListener('touchcancel', e => {
        e.preventDefault();
        mobileDir[dir] = false;
        btn.classList.remove('active');
    });
    // Handle finger sliding off button
    btn.addEventListener('touchmove', e => {
        e.preventDefault();
        const touch = e.touches[0];
        const rect = btn.getBoundingClientRect();
        const inside = touch.clientX >= rect.left && touch.clientX <= rect.right &&
                       touch.clientY >= rect.top && touch.clientY <= rect.bottom;
        if (!inside) {
            mobileDir[dir] = false;
            btn.classList.remove('active');
        }
    });
    btn.addEventListener('mousedown', () => { mobileDir[dir] = true; btn.classList.add('active'); });
    btn.addEventListener('mouseup', () => { mobileDir[dir] = false; btn.classList.remove('active'); });
});

// Action button (A) - context-sensitive
const actionBtn = document.getElementById('actionBtn');
const muteBtn = document.getElementById('muteBtn');

function handleActionPress() {
    initAudio();
    if (state === STATE.MENU) { startGame(); }
    else if (state === STATE.WAVE_INTRO) { state = STATE.PLAYING; }
    else if (state === STATE.GAMEOVER) {
        if (playerName.length > 0) submitScore();
        else focusMobileInput();
    }
    else if (state === STATE.LEADERBOARD) { state = STATE.MENU; }
    else if (state === STATE.PAUSED) { state = STATE.PLAYING; }
}

actionBtn.addEventListener('touchstart', e => {
    e.preventDefault();
    actionBtn.classList.add('active');
    handleActionPress();
});
actionBtn.addEventListener('touchend', e => {
    e.preventDefault();
    actionBtn.classList.remove('active');
});
actionBtn.addEventListener('touchcancel', e => {
    e.preventDefault();
    actionBtn.classList.remove('active');
});

muteBtn.addEventListener('touchstart', e => {
    e.preventDefault();
    initAudio();
    muted = !muted;
    muteBtn.textContent = muted ? 'UNMUTE' : 'MUTE';
});
muteBtn.addEventListener('click', e => {
    e.preventDefault();
    initAudio();
    muted = !muted;
    muteBtn.textContent = muted ? 'UNMUTE' : 'MUTE';
});

const mobileNameInput = document.getElementById('mobileNameInput');
const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

mobileNameInput.addEventListener('input', () => {
    const val = mobileNameInput.value.replace(/[^a-zA-Z0-9 ]/g, '').toUpperCase().substring(0, 8);
    mobileNameInput.value = val;
    playerName = val;
});
mobileNameInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && playerName.length > 0) {
        e.preventDefault();
        submitScore();
    }
});
// Prevent the hidden input from losing focus on mobile during GAMEOVER
mobileNameInput.addEventListener('blur', () => {
    if (state === STATE.GAMEOVER && isTouchDevice) {
        setTimeout(() => {
            if (state === STATE.GAMEOVER) mobileNameInput.focus();
        }, 100);
    }
});

function focusMobileInput() {
    if (isTouchDevice) {
        mobileNameInput.value = playerName;
        mobileNameInput.focus();
    }
}
function blurMobileInput() {
    mobileNameInput.blur();
}

canvas.addEventListener('click', () => {
    initAudio();
    if (state === STATE.MENU) startGame();
    else if (state === STATE.WAVE_INTRO) state = STATE.PLAYING;
    else if (state === STATE.LEADERBOARD) state = STATE.MENU;
    else if (state === STATE.GAMEOVER) focusMobileInput();
});

// INSERT COIN splash — gates audio behind a user gesture
const coinSplash = document.getElementById('coinSplash');
function dismissSplash() {
    if (!coinSplash) return;
    initAudio();
    coinSplash.style.transition = 'opacity 0.3s';
    coinSplash.style.opacity = '0';
    setTimeout(() => { coinSplash.style.display = 'none'; }, 300);
    coinSplash.removeEventListener('click', dismissSplash);
    coinSplash.removeEventListener('touchstart', dismissSplash);
}
coinSplash.addEventListener('click', dismissSplash);
coinSplash.addEventListener('touchstart', e => {
    e.preventDefault();
    dismissSplash();
});

// ============================================================
// GAME STATE
// ============================================================
let player, anchors, collectibles, particles, floatingTexts;
let wave, score, hiScore, combo, comboTimer, lives;
let playerName, dodgeCount, totalAnchorsThisWave, anchorsSpawned;
let spawnTimer, spawnInterval;
let invincibleTimer, shieldTimer, slowmoTimer;
let screenShake;
let waterOffset = 0;
let frameCount = 0;
let perfectWave = true;
let leaderboardData = [];
const TOTAL_WAVES = 25;

const STORAGE_KEY = 'anchorman_scores';
const NAME_KEY = 'anchorman_name';

hiScore = 0;
playerName = '';
try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) { const lb = JSON.parse(raw); if (lb.length > 0) hiScore = lb[0].score; }
    const savedName = localStorage.getItem(NAME_KEY);
    if (savedName) playerName = savedName;
} catch(e) {}

// ============================================================
// DIFFICULTY SYSTEM - 25 Waves, Aggressive Early Ramp
// ============================================================
// Design principles:
// - Waves 1-2: "Okay, I got this" - Brief intro
// - Waves 3-5: "Wait, already?!" - Difficulty takes off fast
// - Waves 6-10: "Oh no" - Full chaos unlocked
// - Waves 11-24: "One more try" - Relentless expert territory
// - Wave 25: "The Anchor Storm" - Final boss wave
//
// Uses sqrt/pow curves to front-load difficulty growth.
// By wave 5 you should be sweating.
// ============================================================
function getWaveConfig(w) {
    // Normalized progress (0 to 1)
    const p = (w - 1) / (TOTAL_WAVES - 1);

    // Anchor count: sqrt curve front-loads the ramp HARD
    // W1=10, W3=26, W5=32, W10=44, W15=52, W20=59, W25=65
    const count = Math.floor(10 + Math.pow(p, 0.5) * 55);

    // Anchor speed: faster earlier via pow(0.7) curve
    // W1=1.8, W5=2.5, W10=3.2, W15=3.6, W25=4.5
    const speed = 1.8 + Math.pow(p, 0.7) * 2.7;

    // Spawn interval (frames between anchors): drops fast
    // W1=45, W5=30, W10=21, W15=16, W25=8
    const interval = Math.max(8, Math.floor(45 - Math.pow(p, 0.6) * 37));

    // Aimed anchors: start wave 2, ramp aggressively to 70%
    const aimChance = w <= 1 ? 0 : Math.min(0.70, Math.pow(p, 0.6) * 0.75);

    // Cluster spawns (2-4 anchors at once): start wave 3
    const clusterChance = w <= 2 ? 0 : Math.min(0.40, Math.pow(p, 0.7) * 0.45);

    // Spinning anchors: start wave 4
    const spinChance = w <= 3 ? 0 : Math.min(0.50, Math.pow(p, 0.6) * 0.55);

    // Big anchors: start wave 7
    const bigChance = w <= 6 ? 0 : Math.min(0.25, (p - 0.2) * 0.35);

    // Cross volleys: start wave 8 instead of 14
    const crossVolley = w >= 8;
    const crossChance = w < 8 ? 0 : Math.min(0.35, (w - 8) * 0.025);

    // Collectibles per wave: slightly more to compensate for harder waves
    const collectibleCount = Math.floor(1 + w / 5);

    return { count, speed, interval, aimChance, clusterChance, spinChance,
             bigChance, crossVolley, crossChance, collectibleCount };
}

// ============================================================
// PLAYER
// ============================================================
function createPlayer() {
    return { x: W / 2, y: H / 2 + 80, w: 26, h: 34, speed: 4 };
}

function drawPlayer(p) {
    const px = Math.floor(p.x), py = Math.floor(p.y);
    if (invincibleTimer > 0 && Math.floor(frameCount / 4) % 2 === 0) return;

    // Shield glow
    if (shieldTimer > 0) {
        ctx.globalAlpha = 0.2 + Math.sin(frameCount * 0.15) * 0.1;
        ctx.fillStyle = COL.neonGreen;
        ctx.beginPath();
        ctx.arc(px, py - 4, 26, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
    }

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath();
    ctx.ellipse(px, py + 16, 10, 4, 0, 0, Math.PI * 2);
    ctx.fill();

    // Legs
    ctx.fillStyle = '#2a4a7a';
    ctx.fillRect(px - 6, py + 5, 5, 12);
    ctx.fillRect(px + 1, py + 5, 5, 12);

    // Shoes
    ctx.fillStyle = '#3a2a1a';
    ctx.fillRect(px - 7, py + 15, 6, 3);
    ctx.fillRect(px + 1, py + 15, 6, 3);

    // Torso
    ctx.fillStyle = '#cc3333';
    ctx.fillRect(px - 8, py - 10, 16, 17);

    // Shirt collar
    ctx.fillStyle = '#aa2222';
    ctx.fillRect(px - 3, py - 10, 6, 3);

    // Arms
    ctx.fillStyle = '#cc3333';
    ctx.fillRect(px - 12, py - 7, 5, 12);
    ctx.fillRect(px + 7, py - 7, 5, 12);

    // Hands
    ctx.fillStyle = '#f4c99a';
    ctx.fillRect(px - 12, py + 3, 5, 4);
    ctx.fillRect(px + 7, py + 3, 5, 4);

    // Head
    ctx.fillStyle = '#f4c99a';
    ctx.fillRect(px - 6, py - 20, 12, 11);

    // Hair
    ctx.fillStyle = '#5a3a1a';
    ctx.fillRect(px - 7, py - 23, 14, 5);
    ctx.fillRect(px - 7, py - 20, 2, 4);
    ctx.fillRect(px + 5, py - 20, 2, 4);

    // Sunglasses
    ctx.fillStyle = '#111';
    ctx.fillRect(px - 5, py - 16, 5, 3);
    ctx.fillRect(px + 1, py - 16, 5, 3);
    ctx.fillRect(px - 1, py - 15, 2, 1);

    // Mouth (slight grin)
    ctx.fillStyle = '#c4846a';
    ctx.fillRect(px - 2, py - 11, 5, 1);

    // Beer in right hand
    ctx.fillStyle = COL.neonAmber;
    ctx.fillRect(px + 10, py - 1, 5, 8);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(px + 10, py - 2, 5, 2);
    ctx.fillStyle = COL.boatDark;
    ctx.fillRect(px + 14, py, 2, 6);
}

// ============================================================
// ANCHORS
// ============================================================
function spawnAnchor(config, forceAimed) {
    const aimed = forceAimed || Math.random() < config.aimChance;
    const big = Math.random() < config.bigChance;
    const spinning = Math.random() < config.spinChance;
    const side = Math.floor(Math.random() * 4);
    let x, y;
    const spd = config.speed * (big ? 0.55 : 1) * (0.85 + Math.random() * 0.3);
    const margin = 40;

    if (side === 0) { x = margin + Math.random() * (W - margin * 2); y = -25; }
    else if (side === 1) { x = W + 25; y = margin + Math.random() * (H - margin * 2 - 80); }
    else if (side === 2) { x = margin + Math.random() * (W - margin * 2); y = H + 25; }
    else { x = -25; y = margin + Math.random() * (H - margin * 2 - 80); }

    let vx, vy;
    if (aimed) {
        const dx = player.x - x, dy = player.y - y;
        const spread = 0.12;
        const angle = Math.atan2(dy, dx) + (Math.random() - 0.5) * spread;
        vx = Math.cos(angle) * spd;
        vy = Math.sin(angle) * spd;
    } else {
        const tx = W * 0.15 + Math.random() * W * 0.7;
        const ty = H * 0.15 + Math.random() * H * 0.55;
        const dx = tx - x, dy = ty - y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        vx = (dx / dist) * spd;
        vy = (dy / dist) * spd;
    }

    const size = big ? 24 : 14;
    anchors.push({
        x, y, vx, vy, size, big, spinning,
        rotation: Math.random() * Math.PI * 2,
        rotSpeed: spinning ? (0.06 + Math.random() * 0.1) * (Math.random() < 0.5 ? 1 : -1) : 0.02,
        nearMissScored: false,
    });
}

function spawnCrossVolley(config) {
    // Anchors from two opposite sides aimed at player
    const horizontal = Math.random() < 0.5;
    const spd = config.speed * 0.9;
    const count = 2 + Math.floor(Math.random() * 2);
    for (let i = 0; i < count; i++) {
        const offset = (i - (count-1)/2) * 40;
        if (horizontal) {
            // Left and right
            const y = player.y + offset + (Math.random() - 0.5) * 20;
            anchors.push({ x: -20, y, vx: spd, vy: (Math.random()-0.5)*0.5, size: 14,
                big: false, spinning: false, rotation: 0, rotSpeed: 0.02, nearMissScored: false });
            anchors.push({ x: W+20, y: y + (Math.random()-0.5)*30, vx: -spd, vy: (Math.random()-0.5)*0.5, size: 14,
                big: false, spinning: false, rotation: 0, rotSpeed: 0.02, nearMissScored: false });
            anchorsSpawned += 2;
        } else {
            const x = player.x + offset + (Math.random() - 0.5) * 20;
            anchors.push({ x, y: -20, vx: (Math.random()-0.5)*0.5, vy: spd, size: 14,
                big: false, spinning: false, rotation: 0, rotSpeed: 0.02, nearMissScored: false });
            anchors.push({ x: x + (Math.random()-0.5)*30, y: H+20, vx: (Math.random()-0.5)*0.5, vy: -spd, size: 14,
                big: false, spinning: false, rotation: 0, rotSpeed: 0.02, nearMissScored: false });
            anchorsSpawned += 2;
        }
    }
}

function drawAnchor(a) {
    ctx.save();
    ctx.translate(a.x, a.y);
    ctx.rotate(a.rotation);
    const s = a.size;
    const r = s / 14;

    // Danger glow for big anchors
    if (a.big) {
        ctx.globalAlpha = 0.15 + Math.sin(frameCount * 0.1) * 0.05;
        ctx.fillStyle = COL.red;
        ctx.beginPath();
        ctx.arc(0, 0, s + 6, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
    }

    // Shaft
    ctx.fillStyle = a.big ? '#5a6a7a' : COL.anchor;
    ctx.fillRect(-2 * r, -s, 4 * r, s * 2);

    // Ring
    ctx.strokeStyle = a.big ? '#5a6a7a' : COL.anchor;
    ctx.lineWidth = 2.5 * r;
    ctx.beginPath();
    ctx.arc(0, -s - 4 * r, 5 * r, 0, Math.PI * 2);
    ctx.stroke();

    // Left fluke
    ctx.fillStyle = a.big ? '#4a5a6a' : COL.anchorDark;
    ctx.beginPath();
    ctx.moveTo(-1 * r, s);
    ctx.lineTo(-9 * r, s - 3 * r);
    ctx.lineTo(-8 * r, s + 4 * r);
    ctx.lineTo(-1 * r, s + 2 * r);
    ctx.fill();
    // Right fluke
    ctx.beginPath();
    ctx.moveTo(1 * r, s);
    ctx.lineTo(9 * r, s - 3 * r);
    ctx.lineTo(8 * r, s + 4 * r);
    ctx.lineTo(1 * r, s + 2 * r);
    ctx.fill();

    // Cross bar
    ctx.fillStyle = a.big ? '#5a6a7a' : COL.anchor;
    ctx.fillRect(-7 * r, -s * 0.3, 14 * r, 3 * r);

    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(-0.5 * r, -s, 2 * r, s * 2);

    ctx.restore();
}

// ============================================================
// COLLECTIBLES
// ============================================================
function spawnCollectible() {
    const types = ['beer', 'lifejacket', 'slowmo', 'shield'];
    const weights = [50, 8, 22, 20];
    let total = weights.reduce((a, b) => a + b, 0);
    let r = Math.random() * total;
    let type = types[0];
    for (let i = 0; i < weights.length; i++) {
        r -= weights[i]; if (r <= 0) { type = types[i]; break; }
    }
    collectibles.push({
        x: 80 + Math.random() * (W - 160),
        y: 80 + Math.random() * (H - 200),
        type, size: 12,
        bobOffset: Math.random() * Math.PI * 2,
        life: 540,
    });
}

function drawCollectible(c) {
    const bob = Math.sin(frameCount * 0.05 + c.bobOffset) * 3;
    const cx = c.x, cy = c.y + bob;

    ctx.globalAlpha = 0.25 + Math.sin(frameCount * 0.08) * 0.1;
    let glowColor;
    switch(c.type) {
        case 'beer': glowColor = COL.neonAmber; break;
        case 'lifejacket': glowColor = COL.red; break;
        case 'slowmo': glowColor = COL.neonBlue; break;
        case 'shield': glowColor = COL.neonGreen; break;
    }
    ctx.fillStyle = glowColor;
    ctx.beginPath(); ctx.arc(cx, cy, 16, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;

    switch(c.type) {
        case 'beer':
            ctx.fillStyle = COL.neonAmber;
            ctx.fillRect(cx - 6, cy - 7, 12, 14);
            ctx.fillStyle = '#fff';
            ctx.fillRect(cx - 6, cy - 9, 12, 3);
            ctx.fillStyle = COL.boatDark;
            ctx.fillRect(cx + 5, cy - 5, 3, 9);
            break;
        case 'lifejacket':
            ctx.strokeStyle = COL.red; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.arc(cx, cy, 8, 0, Math.PI * 2); ctx.stroke();
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
            [0, Math.PI/2, Math.PI, Math.PI*1.5].forEach(a => {
                ctx.beginPath(); ctx.arc(cx, cy, 8, a - 0.3, a + 0.3); ctx.stroke();
            });
            break;
        case 'slowmo':
            ctx.strokeStyle = COL.neonBlue; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(cx, cy, 9, 0, Math.PI * 2); ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(cx, cy); ctx.lineTo(cx, cy - 6);
            ctx.moveTo(cx, cy); ctx.lineTo(cx + 4, cy + 1);
            ctx.stroke();
            break;
        case 'shield':
            ctx.fillStyle = COL.neonGreen;
            ctx.beginPath();
            ctx.moveTo(cx, cy - 10); ctx.lineTo(cx + 8, cy - 5);
            ctx.lineTo(cx + 6, cy + 6); ctx.lineTo(cx, cy + 10);
            ctx.lineTo(cx - 6, cy + 6); ctx.lineTo(cx - 8, cy - 5);
            ctx.closePath(); ctx.fill();
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.fillRect(cx - 1, cy - 6, 2, 12);
            ctx.fillRect(cx - 4, cy - 2, 8, 2);
            break;
    }
}

// ============================================================
// PARTICLES & FLOATING TEXT
// ============================================================
function addParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 1 + Math.random() * 3;
        particles.push({
            x, y,
            vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
            life: 20 + Math.random() * 20, maxLife: 40,
            color, size: 1.5 + Math.random() * 3,
        });
    }
}
function addSplash(x, y) {
    for (let i = 0; i < 10; i++) {
        const angle = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI * 0.8;
        const speed = 1 + Math.random() * 2.5;
        particles.push({
            x, y,
            vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 1,
            life: 18 + Math.random() * 12, maxLife: 30,
            color: '#6ab4f7', size: 2 + Math.random() * 3,
        });
    }
}
function addFloatingText(x, y, text, color) {
    floatingTexts.push({ x, y, text, color, life: 70, maxLife: 70 });
}

// ============================================================
// SCENERY RENDERING
// ============================================================
function drawWater() {
    ctx.fillStyle = COL.water1;
    ctx.fillRect(0, 0, W, H);

    waterOffset += 0.018;
    ctx.strokeStyle = 'rgba(74, 144, 255, 0.07)';
    ctx.lineWidth = 1;
    for (let row = 0; row < H; row += 10) {
        ctx.beginPath();
        for (let x = 0; x < W; x += 3) {
            const y = row + Math.sin(x * 0.018 + waterOffset + row * 0.08) * 3.5;
            if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.stroke();
    }

    // Shimmer reflections
    ctx.fillStyle = 'rgba(74, 144, 255, 0.05)';
    for (let i = 0; i < 20; i++) {
        const sx = (i * 107 + frameCount * 0.25) % (W + 40) - 20;
        const sy = (i * 53 + Math.sin(frameCount * 0.009 + i) * 25) % H;
        ctx.beginPath();
        ctx.ellipse(sx, sy, 18 + Math.sin(frameCount * 0.025 + i) * 6, 3, 0, 0, Math.PI * 2);
        ctx.fill();
    }
}

function drawShoreline() {
    // Distant treeline along top edge (Burt Lake shoreline)
    const shoreY = 18;

    // Sky gradient at very top
    const skyGrad = ctx.createLinearGradient(0, 0, 0, shoreY + 30);
    skyGrad.addColorStop(0, 'rgba(20, 30, 55, 0.6)');
    skyGrad.addColorStop(1, 'rgba(10, 42, 74, 0)');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, shoreY + 30);

    // Distant hills/mountains
    ctx.fillStyle = COL.mountain;
    ctx.beginPath();
    ctx.moveTo(0, shoreY + 12);
    for (let x = 0; x <= W; x += 20) {
        const h = Math.sin(x * 0.008) * 6 + Math.sin(x * 0.02 + 1) * 3 + Math.sin(x * 0.05) * 2;
        ctx.lineTo(x, shoreY + 4 - h);
    }
    ctx.lineTo(W, shoreY + 20);
    ctx.lineTo(0, shoreY + 20);
    ctx.closePath();
    ctx.fill();

    // Tree line
    ctx.fillStyle = COL.treeDark;
    for (let x = 0; x < W; x += 8) {
        const treeH = 8 + Math.sin(x * 0.15) * 3 + Math.sin(x * 0.4 + 2) * 2;
        const ty = shoreY + 6;
        // Triangle tree
        ctx.beginPath();
        ctx.moveTo(x, ty);
        ctx.lineTo(x + 4, ty - treeH);
        ctx.lineTo(x + 8, ty);
        ctx.closePath();
        ctx.fill();
    }

    // Second layer of trees (lighter, in front)
    ctx.fillStyle = COL.treeMid;
    for (let x = 3; x < W; x += 12) {
        const treeH = 6 + Math.sin(x * 0.2 + 1) * 2.5;
        const ty = shoreY + 10;
        ctx.beginPath();
        ctx.moveTo(x, ty);
        ctx.lineTo(x + 5, ty - treeH);
        ctx.lineTo(x + 10, ty);
        ctx.closePath();
        ctx.fill();
    }

    // Shore reflection in water
    const reflGrad = ctx.createLinearGradient(0, shoreY + 10, 0, shoreY + 35);
    reflGrad.addColorStop(0, 'rgba(10, 40, 20, 0.15)');
    reflGrad.addColorStop(1, 'rgba(10, 42, 74, 0)');
    ctx.fillStyle = reflGrad;
    ctx.fillRect(0, shoreY + 10, W, 25);
}

function drawBoatDeck() {
    const bx = 60, by = 50, bw = W - 120, bh = H - 120;

    // Water shadow
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath();
    ctx.ellipse(W/2, by + bh + 12, bw/2 + 15, 18, 0, 0, Math.PI * 2);
    ctx.fill();

    // Wake lines behind boat
    ctx.strokeStyle = 'rgba(150, 200, 255, 0.08)';
    ctx.lineWidth = 2;
    for (let i = 0; i < 3; i++) {
        const wy = by + bh + 20 + i * 8;
        const wobble = Math.sin(frameCount * 0.03 + i) * 3;
        ctx.beginPath();
        ctx.moveTo(W/2 - 60 - i * 30, wy + wobble);
        ctx.quadraticCurveTo(W/2, wy - 5 + wobble, W/2 + 60 + i * 30, wy + wobble);
        ctx.stroke();
    }

    // Hull
    ctx.fillStyle = COL.boat;
    ctx.beginPath();
    ctx.moveTo(bx + 15, by);
    ctx.lineTo(bx + bw - 15, by);
    ctx.quadraticCurveTo(bx + bw + 20, by + bh * 0.3, bx + bw - 8, by + bh);
    ctx.lineTo(W/2, by + bh + 25);
    ctx.lineTo(bx + 8, by + bh);
    ctx.quadraticCurveTo(bx - 20, by + bh * 0.3, bx + 15, by);
    ctx.fill();

    // Hull stripe
    ctx.strokeStyle = '#aa8030';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(bx + 20, by + 15);
    ctx.quadraticCurveTo(bx + bw/2, by + 12, bx + bw - 20, by + 15);
    ctx.stroke();

    // Deck
    ctx.fillStyle = COL.boatDeck;
    ctx.beginPath();
    ctx.moveTo(bx + 20, by + 8);
    ctx.lineTo(bx + bw - 20, by + 8);
    ctx.quadraticCurveTo(bx + bw + 8, by + bh * 0.3, bx + bw - 14, by + bh - 6);
    ctx.lineTo(W/2, by + bh + 16);
    ctx.lineTo(bx + 14, by + bh - 6);
    ctx.quadraticCurveTo(bx - 8, by + bh * 0.3, bx + 20, by + 8);
    ctx.fill();

    // Plank lines
    ctx.strokeStyle = 'rgba(0,0,0,0.08)';
    ctx.lineWidth = 1;
    for (let py = by + 24; py < by + bh; py += 16) {
        ctx.beginPath();
        ctx.moveTo(bx + 28, py);
        ctx.lineTo(bx + bw - 28, py);
        ctx.stroke();
    }
    // Vertical plank seams
    for (let px = bx + 60; px < bx + bw - 40; px += 55) {
        const seamy = by + 20 + (Math.abs(px - W/2) / (bw/2)) * 20;
        ctx.beginPath();
        ctx.moveTo(px, seamy);
        ctx.lineTo(px, by + bh - 20);
        ctx.stroke();
    }

    // Gunwale (top rail)
    ctx.strokeStyle = COL.boatDark;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(bx + 15, by);
    ctx.lineTo(bx + bw - 15, by);
    ctx.quadraticCurveTo(bx + bw + 20, by + bh * 0.3, bx + bw - 8, by + bh);
    ctx.lineTo(W/2, by + bh + 25);
    ctx.lineTo(bx + 8, by + bh);
    ctx.quadraticCurveTo(bx - 20, by + bh * 0.3, bx + 15, by);
    ctx.stroke();

    // Seats (two bench seats)
    ctx.fillStyle = '#7a6030';
    // Front seat
    ctx.fillRect(bx + 80, by + bh - 60, bw - 160, 8);
    ctx.fillStyle = '#6a5020';
    ctx.fillRect(bx + 80, by + bh - 53, 4, 10);
    ctx.fillRect(bx + bw - 84, by + bh - 53, 4, 10);

    // Back seat
    ctx.fillStyle = '#7a6030';
    ctx.fillRect(bx + 60, by + 30, bw - 120, 8);
    ctx.fillStyle = '#6a5020';
    ctx.fillRect(bx + 60, by + 37, 4, 10);
    ctx.fillRect(bx + bw - 64, by + 37, 4, 10);

    // Steering console (back center)
    ctx.fillStyle = '#555';
    ctx.fillRect(W/2 - 20, by + 14, 40, 20);
    ctx.fillStyle = '#444';
    ctx.fillRect(W/2 - 18, by + 16, 36, 16);
    // Steering wheel
    ctx.strokeStyle = '#888';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(W/2, by + 24, 7, 0, Math.PI * 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(W/2, by + 17); ctx.lineTo(W/2, by + 31);
    ctx.moveTo(W/2 - 7, by + 24); ctx.lineTo(W/2 + 7, by + 24);
    ctx.stroke();

    // Windshield
    ctx.strokeStyle = 'rgba(150, 200, 255, 0.25)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(W/2 - 50, by + 12);
    ctx.quadraticCurveTo(W/2, by + 6, W/2 + 50, by + 12);
    ctx.stroke();
    // Glass reflection
    ctx.fillStyle = 'rgba(100, 180, 255, 0.06)';
    ctx.beginPath();
    ctx.moveTo(W/2 - 48, by + 12);
    ctx.quadraticCurveTo(W/2, by + 7, W/2 + 48, by + 12);
    ctx.lineTo(W/2 + 40, by + 5);
    ctx.quadraticCurveTo(W/2, by + 1, W/2 - 40, by + 5);
    ctx.closePath();
    ctx.fill();

    // Cleats (tie-down points on gunwale)
    ctx.fillStyle = '#aaa';
    [[bx + 30, by + bh * 0.3], [bx + bw - 30, by + bh * 0.3],
     [bx + 20, by + bh * 0.7], [bx + bw - 20, by + bh * 0.7]].forEach(([cx, cy]) => {
        ctx.fillRect(cx - 4, cy - 1, 8, 3);
        ctx.fillRect(cx - 2, cy - 3, 1, 6);
        ctx.fillRect(cx + 1, cy - 3, 1, 6);
    });

    // Cooler in the back
    ctx.fillStyle = '#2a5a9a';
    ctx.fillRect(bx + bw - 80, by + 42, 26, 16);

async function loadLeaderboard() {
    if (cloudReady) {
        try {
            const { data, error } = await sbClient
                .from(TABLE_NAME)
                .select('name, score, wave, timestamp')
                .order('score', { ascending: false })
                .limit(20);
            if (error) throw error;
            leaderboardData = data || [];
            return;
        } catch(e) {
            console.warn('Cloud read failed — using local scores:', e);
        }
    }
    // Fallback to local
    try {
        leaderboardData = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]')
            .sort((a, b) => b.score - a.score).slice(0, 20);
    } catch(e) { leaderboardData = []; }
}

// ============================================================
// GAME LOGIC
// ============================================================
function startGame() {
    initAudio();
    player = createPlayer();
    anchors = [];
    collectibles = [];
    particles = [];
    floatingTexts = [];
    wave = 1;
    score = 0;
    combo = 0;
    comboTimer = 0;
    lives = 3;
    dodgeCount = 0;
    anchorsSpawned = 0;
    totalAnchorsThisWave = 0;
    spawnTimer = 0;
    invincibleTimer = 0;
    shieldTimer = 0;
    slowmoTimer = 0;
    screenShake = 0;
    perfectWave = true;
    playerName = localStorage.getItem(NAME_KEY) || '';
    startWave();
}

function startWave() {
    const config = getWaveConfig(wave);
    totalAnchorsThisWave = config.count;
    anchorsSpawned = 0;
    spawnTimer = 60;
    spawnInterval = config.interval;
    perfectWave = true;
    state = STATE.WAVE_INTRO;

    for (let i = 0; i < config.collectibleCount; i++) {
        setTimeout(() => {
            if (state === STATE.PLAYING) spawnCollectible();
        }, (i + 1) * 2500);
    }
}

function clearWave() {
    playSound('waveClear');
    const waveBonus = wave * 150;
    score += waveBonus;
    addFloatingText(W/2, H/2 - 20, '+' + waveBonus + ' WAVE BONUS', COL.gold);

    // Perfect wave bonus (no hits taken)
    if (perfectWave) {
        const perfectBonus = wave * 100;
        score += perfectBonus;
        setTimeout(() => {
            addFloatingText(W/2, H/2 + 10, 'PERFECT! +' + perfectBonus, COL.neonPink);
        }, 300);
    }

    wave++;
    if (wave > TOTAL_WAVES) {
        playSound('victory');
        endGame();
        return;
    }
    collectibles = [];
    startWave();
}

function endGame() {
    if (score > hiScore) hiScore = score;
    if (wave <= TOTAL_WAVES) playSound('gameOver');
    state = STATE.GAMEOVER;
    focusMobileInput();
}

async function submitScore() {
    if (playerName.length === 0) return;
    blurMobileInput();

    const entry = {
        name: playerName.toUpperCase().substring(0, 8),
        score: score,
        wave: Math.min(wave, TOTAL_WAVES),
        timestamp: Date.now()
    };

    // Save locally
    try {
        const scores = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        scores.push(entry);
        scores.sort((a, b) => b.score - a.score);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(scores.slice(0, 20)));
        localStorage.setItem(NAME_KEY, playerName);
    } catch(e) {}

    // Save to cloud
    if (cloudReady) {
        try {
            const { error } = await sbClient.from(TABLE_NAME).insert(entry);
            if (error) throw error;
            // Flush pending
            const pending = JSON.parse(localStorage.getItem('anchorManPending') || '[]');
            if (pending.length > 0) {
                const { error: flushErr } = await sbClient.from(TABLE_NAME).insert(pending);
                if (!flushErr) localStorage.removeItem('anchorManPending');
            }
        } catch(e) {
            console.warn('Cloud write failed — queuing:', e);
            const pending = JSON.parse(localStorage.getItem('anchorManPending') || '[]');
            pending.push(entry);
            localStorage.setItem('anchorManPending', JSON.stringify(pending));
        }
    } else {
        const pending = JSON.parse(localStorage.getItem('anchorManPending') || '[]');
        pending.push(entry);
        localStorage.setItem('anchorManPending', JSON.stringify(pending));
    }

    await loadLeaderboard();
    state = STATE.LEADERBOARD;
}

function hitPlayer() {
    if (invincibleTimer > 0) return;
    perfectWave = false;

    if (shieldTimer > 0) {
        shieldTimer = 0;
        invincibleTimer = 30;
        addParticles(player.x, player.y, COL.neonGreen, 12);
        addFloatingText(player.x, player.y - 25, 'SHIELD BREAK', COL.neonGreen);
        playSound('hit');
        screenShake = 6;
        return;
    }

    lives--;
    playSound('hit');
    addParticles(player.x, player.y, COL.red, 18);
    screenShake = 10;
    combo = 0;
    comboTimer = 0;
    invincibleTimer = 90;

    if (lives <= 0) endGame();
}

function collectItem(c) {
    switch(c.type) {
        case 'beer':
            const pts = 300 + wave * 15;
            score += pts;
            addFloatingText(c.x, c.y - 12, '+' + pts, COL.neonAmber);
            playSound('collect');
            break;
        case 'lifejacket':
            if (lives < 5) {
                lives++;
                addFloatingText(c.x, c.y - 12, '+1 LIFE', COL.red);
            } else {
                score += 500;
                addFloatingText(c.x, c.y - 12, '+500', COL.red);
            }
            playSound('powerup');
            break;
        case 'slowmo':
            slowmoTimer = 300;
            addFloatingText(c.x, c.y - 12, 'SLOW-MO!', COL.neonBlue);
            playSound('powerup');
            break;
        case 'shield':
            shieldTimer = 480;
            addFloatingText(c.x, c.y - 12, 'SHIELD!', COL.neonGreen);
            playSound('powerup');
            break;
    }
    addParticles(c.x, c.y, COL.white, 8);
}

function circleRect(cx, cy, cr, rx, ry, rw, rh) {
    const closestX = Math.max(rx, Math.min(cx, rx + rw));
    const closestY = Math.max(ry, Math.min(cy, ry + rh));
    const dx = cx - closestX, dy = cy - closestY;
    return (dx * dx + dy * dy) < (cr * cr);
}

// ============================================================
// UPDATE
// ============================================================
function update() {
    frameCount++;
    if (state !== STATE.PLAYING) return;

    const slowFactor = slowmoTimer > 0 ? 0.4 : 1;

    if (invincibleTimer > 0) invincibleTimer--;
    if (shieldTimer > 0) shieldTimer--;
    if (slowmoTimer > 0) slowmoTimer--;
    if (comboTimer > 0) { comboTimer--; if (comboTimer <= 0) combo = 0; }

    // Player movement
    const spd = player.speed;
    let dx = 0, dy = 0;
    if (keys['ArrowLeft'] || keys['a'] || keys['A'] || mobileDir.left) dx -= spd;
    if (keys['ArrowRight'] || keys['d'] || keys['D'] || mobileDir.right) dx += spd;
    if (keys['ArrowUp'] || keys['w'] || keys['W'] || mobileDir.up) dy -= spd;
    if (keys['ArrowDown'] || keys['s'] || keys['S'] || mobileDir.down) dy += spd;

    if (dx !== 0 && dy !== 0) { dx *= 0.707; dy *= 0.707; }
    player.x += dx;
    player.y += dy;

    // Boat deck bounds
    const deckLeft = 82, deckRight = W - 82;
    const deckTop = 65, deckBottom = H - 85;
    player.x = Math.max(deckLeft, Math.min(deckRight, player.x));
    player.y = Math.max(deckTop, Math.min(deckBottom, player.y));

    // Spawn anchors
    spawnTimer -= slowFactor;
    if (spawnTimer <= 0 && anchorsSpawned < totalAnchorsThisWave) {
        const config = getWaveConfig(wave);

        // Cross volley check
        if (config.crossVolley && Math.random() < config.crossChance && anchorsSpawned + 4 <= totalAnchorsThisWave) {
            spawnCrossVolley(config);
        }
        // Cluster check
        else if (Math.random() < config.clusterChance) {
            const clusterSize = 2 + Math.floor(Math.random() * 3);
            for (let i = 0; i < clusterSize && anchorsSpawned < totalAnchorsThisWave; i++) {
                spawnAnchor(config);
                anchorsSpawned++;
            }
        } else {
            spawnAnchor(config);
            anchorsSpawned++;
        }
        spawnTimer = spawnInterval;
    }

    // Update anchors
    for (let i = anchors.length - 1; i >= 0; i--) {
        const a = anchors[i];
        a.x += a.vx * slowFactor;
        a.y += a.vy * slowFactor;
        a.rotation += a.rotSpeed * slowFactor;

        // Collision
        const hitRadius = a.size * 0.75;
        if (circleRect(a.x, a.y, hitRadius, player.x - player.w/2, player.y - player.h/2, player.w, player.h)) {
            hitPlayer();
            addParticles(a.x, a.y, COL.anchor, 10);
            addSplash(a.x, a.y);
            playSound('splash');
            anchors.splice(i, 1);
            continue;
        }

        // Near miss
        if (!a.nearMissScored) {
            const nearDist = a.size + 22;
            const pdx = a.x - player.x, pdy = a.y - player.y;
            const dist = Math.sqrt(pdx * pdx + pdy * pdy);
            if (dist < nearDist) {
                const dotProduct = pdx * a.vx + pdy * a.vy;
                if (dotProduct > 0) {
                    a.nearMissScored = true;
                    combo++;
                    comboTimer = 90;
                    dodgeCount++;
                    const dodgePts = 15 * Math.min(combo, 10);
                    score += dodgePts;
                    if (combo >= 2) {
                        addFloatingText(player.x, player.y - 30, 'x' + combo + ' +' + dodgePts, COL.neonGreen);
                        playSound('dodge');
                    }
                }
            }
        }

        // Off screen removal
        if (a.x < -60 || a.x > W + 60 || a.y < -60 || a.y > H + 60) {
            anchors.splice(i, 1);
        }
    }

    // Wave completion
    if (anchorsSpawned >= totalAnchorsThisWave && anchors.length === 0) {
        clearWave();
    }

    // Collectibles
    for (let i = collectibles.length - 1; i >= 0; i--) {
        const c = collectibles[i];
        c.life--;
        if (c.life <= 0) { collectibles.splice(i, 1); continue; }
        const cdx = c.x - player.x, cdy = c.y - player.y;
        if (Math.sqrt(cdx * cdx + cdy * cdy) < 20) {
            collectItem(c);
            collectibles.splice(i, 1);
        }
    }

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy;
        p.vy += 0.05;
        p.life--;
        if (p.life <= 0) particles.splice(i, 1);
    }

    // Floating texts
    for (let i = floatingTexts.length - 1; i >= 0; i--) {
        const ft = floatingTexts[i];
        ft.y -= 0.7;
        ft.life--;
        if (ft.life <= 0) floatingTexts.splice(i, 1);
    }
}

// ============================================================
// RENDER
// ============================================================
function updateActionBtnLabel() {
    if (!isTouchDevice) return;
    switch(state) {
        case STATE.MENU: actionBtn.textContent = 'START'; break;
        case STATE.WAVE_INTRO: actionBtn.textContent = 'GO'; break;
        case STATE.PLAYING: actionBtn.textContent = 'A'; break;
        case STATE.PAUSED: actionBtn.textContent = 'PLAY'; break;
        case STATE.GAMEOVER: actionBtn.textContent = playerName.length > 0 ? 'SEND' : 'TYPE'; break;
        case STATE.LEADERBOARD: actionBtn.textContent = 'BACK'; break;
    }
}

function render() {
    ctx.save();
    updateActionBtnLabel();

    if (screenShake > 0) {
        ctx.translate((Math.random()-0.5) * screenShake * 2, (Math.random()-0.5) * screenShake * 2);
        screenShake *= 0.82;
        if (screenShake < 0.5) screenShake = 0;
    }

    switch(state) {
        case STATE.MENU: drawMenu(); break;
        case STATE.WAVE_INTRO: drawWaveIntro(); break;
        case STATE.PLAYING:
        case STATE.PAUSED:
            drawWater();
            drawShoreline();
            drawBoatDeck();
            collectibles.forEach(c => {
                if (c.life > 60 || Math.floor(frameCount / 8) % 2 === 0) drawCollectible(c);
            });
            drawPlayer(player);
            anchors.forEach(a => drawAnchor(a));
            particles.forEach(p => {
                ctx.globalAlpha = p.life / p.maxLife;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
            });
            ctx.globalAlpha = 1;
            floatingTexts.forEach(ft => {
                ctx.globalAlpha = ft.life / ft.maxLife;
                ctx.font = '8px "Press Start 2P"';
                ctx.fillStyle = ft.color;
                ctx.textAlign = 'center';
                ctx.fillText(ft.text, ft.x, ft.y);
            });
            ctx.globalAlpha = 1;
            drawHUD();
            if (state === STATE.PAUSED) {
                ctx.fillStyle = 'rgba(6, 12, 22, 0.6)';
                ctx.fillRect(0, 0, W, H);
                ctx.font = '24px "VT323"';
                ctx.fillStyle = COL.neonOrange;
                ctx.textAlign = 'center';
                ctx.fillText('PAUSED', W/2, H/2);
                ctx.font = '8px "Press Start 2P"';
                ctx.fillStyle = COL.textDim;
                ctx.fillText('PRESS P TO RESUME', W/2, H/2 + 30);
            }
            break;
        case STATE.GAMEOVER: drawGameOver(); break;
        case STATE.LEADERBOARD: drawLeaderboard(); break;
    }

    ctx.restore();
}

// ============================================================
// GAME LOOP
// ============================================================
function gameLoop() {
    update();
    render();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
